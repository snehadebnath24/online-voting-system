<!DOCTYPE html>
<html>
<head>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
<h2 class="text-center">Vote Here</h2>

{% if voted %}
<div class="alert alert-success text-center">You already voted</div>
{% else %}
<div class="row">
{% for c in candidates %}
<div class="col-md-4">
<div class="card p-3 text-center">
<h4>{{c[1]}}</h4>
<a href="/vote/{{c[0]}}" class="btn btn-success">Vote</a>
</div>
</div>
{% endfor %}
</div>
{% endif %}

<div class="text-center mt-3">
<a href="/logout" class="btn btn-danger">Logout</a>
</div>

</div>
</body>
</html>
